name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - run: go build ./...
      - run: go vet -unsafeptr=false ./...
      - run: go test -v -race ./...

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - run: go build ./...
      - run: go test -v ./...

  test-arm64-qemu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - uses: docker/setup-qemu-action@v3
      - name: Cross-compile for arm64
        run: GOOS=linux GOARCH=arm64 go build ./...
      - name: Run tests under QEMU user-mode emulation
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          GOOS=linux GOARCH=arm64 go test -c -o badger.test ./...
          qemu-aarch64-static ./badger.test -test.v

  build-darwin-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - run: go build ./...